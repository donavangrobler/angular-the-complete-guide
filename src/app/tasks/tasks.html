<section id="tasks">
  <header>
    <h2>{{ name() }}</h2>
    <menu>
      <button (click)="onAddTask()">Add Task</button>
    </menu>
  </header>
  @for (task of selectedUserTasks(); track task.id) {
    <ul>
      <li><app-task [task]="task"></app-task></li>
    </ul>
  }

  @if (isAddingTask()) {
    <app-new-task [userId]="userId()" (close)="onCloseAddTask()" />
  }
</section>
